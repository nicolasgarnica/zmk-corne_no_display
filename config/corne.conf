# --- RGB Underglow ---
# Enable WS2812 LED strip driver
CONFIG_WS2812_STRIP=y
# Enable RGB underglow support
CONFIG_ZMK_RGB_UNDERGLOW=y
# Keep LEDs off when the keyboard starts up
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
# Cap LED brightness at 80% to reduce power draw
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=80
# Keep LEDs on during idle (set to y to save battery)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n
# Keep LEDs on when USB is disconnected
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n
# Default hue value (160 = cyan/teal range)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
# Default animation effect index (3 = breathing on most setups)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# --- Power Management ---
# Go to deep sleep after 1 hour of inactivity (1*60*60*1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
# Enable deep sleep to conserve battery
CONFIG_ZMK_SLEEP=y
# Enable soft off (power off via key binding, wake with key press)
CONFIG_ZMK_PM_SOFT_OFF=y

# --- Input Handling ---
# Debounce time for key press detection (lower = faster response)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
# Debounce time for key release detection
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

# --- Bluetooth ---
# Boost BT transmit power for improved wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y









